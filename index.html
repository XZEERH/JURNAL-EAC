<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC NETWORK - Portal Hipotesis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --neon: #58a6ff;
            --neon-glow: 0 0 10px rgba(88, 166, 255, 0.4);
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 100px; }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            position: sticky;
            top: 0;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
        }
        .logo { font-weight: 800; color: var(--neon); text-shadow: var(--neon-glow); letter-spacing: 1px; }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200;
        }
        .btn-google {
            background: var(--card); border: 1px solid var(--neon); color: white;
            padding: 12px 25px; border-radius: 12px; cursor: pointer;
            box-shadow: var(--neon-glow); transition: 0.3s;
        }

        /* --- Feed & Cards --- */
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .post-card {
            background: var(--card); border: 1px solid #30363d;
            border-radius: 18px; padding: 16px; margin-bottom: 16px;
            transition: 0.3s;
        }
        .post-card:hover { border-color: var(--neon); box-shadow: var(--neon-glow); }
        
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar { width: 38px; height: 38px; border-radius: 10px; border: 2px solid var(--neon); }
        .user-meta h4 { font-size: 14px; color: white; }
        .user-meta span { font-size: 11px; color: var(--text-dim); }

        .tag {
            display: inline-block; background: rgba(88, 166, 255, 0.1);
            color: var(--neon); padding: 3px 10px; border-radius: 20px;
            font-size: 11px; border: 1px solid rgba(88, 166, 255, 0.2); margin-bottom: 8px;
        }
        .content { font-size: 14px; line-height: 1.6; margin-bottom: 15px; }

        /* --- Debat/Replies Section --- */
        .reply-section {
            border-top: 1px solid #30363d; margin-top: 10px; padding-top: 10px;
            font-size: 13px; display: none;
        }
        .reply-item { margin-bottom: 8px; color: var(--text-dim); }
        .reply-item b { color: var(--neon); }

        .actions { display: flex; gap: 15px; }
        .btn-action {
            background: none; border: none; color: var(--text-dim);
            font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .btn-action:hover { color: var(--neon); }

        /* --- Input Floating --- */
        .input-area {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: #1c2128;
            padding: 10px 18px; border-radius: 30px; display: flex;
            border: 1px solid var(--neon); box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 90;
        }
        .input-area input {
            background: none; border: none; color: white; flex: 1; outline: none;
        }
        .btn-send { background: none; border: none; font-size: 18px; cursor: pointer; }

        /* --- Custom Reply Input --- */
        .reply-input-wrapper { display: flex; gap: 8px; margin-top: 10px; }
        .reply-input-wrapper input {
            background: #0d1117; border: 1px solid #30363d; color: white;
            border-radius: 8px; padding: 5px 10px; flex: 1; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="margin-bottom:20px; color: var(--neon); text-shadow: var(--neon-glow);">EAC NETWORK</h2>
        <button class="btn-google" onclick="login()">Masuk dengan Google</button>
    </div>

    <header>
        <div class="logo">IEA NETWORK</div>
        <div style="font-size: 12px; color: var(--text-dim);" onclick="logout()">Logout</div>
    </header>

    <div class="container" id="main-feed">
        </div>

    <div class="input-area">
        <input type="text" id="postText" placeholder="Tulis hipotesis sainsmu...">
        <button class="btn-send" onclick="sendPost()">🚀</button>
    </div>

    <script>
        // --- CONFIG FIREBASE RAZEERH ---
        const firebaseConfig = {
            apiKey: "AIzaSyDsxGe1eRLeml9xpysKNpieV3A5YeGcAhE",
            authDomain: "eacnetwork-bbaf2.firebaseapp.com",
            projectId: "eacnetwork-bbaf2",
            storageBucket: "eacnetwork-bbaf2.firebasestorage.app",
            messagingSenderId: "121872804132",
            appId: "1:121872804132:web:9e98d2cd2fbc15e229ebb1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. Auth Logic
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) listenPosts();
        });

        // 2. Post Logic
        function sendPost() {
            const user = auth.currentUser;
            const input = document.getElementById('postText');
            if(!input.value.trim()) return;

            db.collection("jurnal").add({
                name: user.displayName,
                photo: user.photoURL,
                content: input.value,
                likes: 0,
                time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => input.value = "");
        }

        // 3. Listen Real-time Posts
        function listenPosts() {
            db.collection("jurnal").orderBy("time", "desc").onSnapshot(snap => {
                const feed = document.getElementById('main-feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="user-info">
                                <img src="${data.photo}" class="avatar">
                                <div class="user-meta"><h4>${data.name}</h4><span>Novice Researcher</span></div>
                            </div>
                            <div class="tag">"Hipotesis Baru"</div>
                            <div class="content">${data.content}</div>
                            
                            <div class="actions">
                                <button class="btn-action" onclick="likePost('${id}', ${data.likes})">❤️ ${data.likes || 0} Like</button>
                                <button class="btn-action" onclick="toggleReply('${id}')">💬 Debat</button>
                            </div>

                            <div class="reply-section" id="section-${id}">
                                <div id="replies-${id}"></div>
                                <div class="reply-input-wrapper">
                                    <input type="text" id="in-${id}" placeholder="Balas debat...">
                                    <button onclick="sendReply('${id}')" style="background:none; border:none; color:var(--neon);">🚀</button>
                                </div>
                            </div>
                        </div>
                    `;
                    listenReplies(id);
                });
            });
        }

        // 4. Reply Logic
        function sendReply(postId) {
            const user = auth.currentUser;
            const input = document.getElementById(`in-${postId}`);
            if(!input.value.trim()) return;

            db.collection("jurnal").doc(postId).collection("debat").add({
                name: user.displayName,
                text: input.value,
                time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => input.value = "");
        }

        function listenReplies(postId) {
            db.collection("jurnal").doc(postId).collection("debat").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById(`replies-${postId}`);
                if(!box) return;
                box.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    box.innerHTML += `<div class="reply-item"><b>${r.name}:</b> ${r.text}</div>`;
                });
            });
        }

        function toggleReply(id) {
            const el = document.getElementById(`section-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function likePost(id, current) {
            db.collection("jurnal").doc(id).update({ likes: (current || 0) + 1 });
        }
    </script>
</body>
</html>
