<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EAC NETWORK | Portal Sains Futuristik</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0b0e14;
            --card: rgba(22, 27, 34, 0.7);
            --neon: #58a6ff;
            --neon-purple: #bc8cff;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --glass-border: rgba(88, 166, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, rgba(88, 166, 255, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(188, 140, 255, 0.05), transparent);
            color: var(--text-main); 
            min-height: 100vh;
            padding-bottom: 120px; 
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        /* --- Header Modern --- */
        header {
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.2rem; background: linear-gradient(90deg, var(--neon), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(88, 166, 255, 0.3); }

        /* --- Login Section (Anti-Ribet) --- */
        #login-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
            padding: 40px; text-align: center;
        }
        .login-card { background: var(--card); border: 1px solid var(--glass-border); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-google {
            background: #fff; color: #000; border: none; padding: 14px 24px; border-radius: 14px;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-top: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1); width: 100%; justify-content: center;
        }

        /* --- Feed & Cards --- */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .post-card {
            background: var(--card); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 20px; margin-bottom: 20px;
            backdrop-filter: blur(5px); animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-info { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .avatar { width: 44px; height: 44px; border-radius: 14px; border: 2px solid var(--neon); padding: 2px; background: var(--bg); }
        .user-meta h4 { font-size: 15px; font-weight: 700; }
        .user-meta span { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .tag {
            display: inline-block; background: rgba(88, 166, 255, 0.1); color: var(--neon);
            padding: 5px 14px; border-radius: 30px; font-size: 11px; font-weight: 600; margin-bottom: 12px;
        }
        .content { font-size: 15px; line-height: 1.7; color: #d1d5db; margin-bottom: 18px; }

        /* --- Debat Section --- */
        .reply-section { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 15px; display: none; }
        .reply-item { margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 12px; font-size: 13px; }
        .reply-item b { color: var(--neon-purple); margin-right: 5px; }

        /* --- Actions --- */
        .actions { display: flex; gap: 20px; }
        .btn-action { background: none; border: none; color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-action:hover { color: var(--neon); }

        /* --- Floating Input --- */
        .input-area {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; background: rgba(28, 33, 40, 0.95);
            padding: 12px 20px; border-radius: 20px; display: flex; align-items: center;
            border: 1px solid var(--glass-border); backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(0,0,0,0.4); z-index: 100;
        }
        .input-area input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 14px; padding-right: 10px; }
        .btn-send { color: var(--neon); background: none; border: none; font-size: 22px; cursor: pointer; display: flex; }

        .reply-input-wrapper { display: flex; gap: 10px; margin-top: 15px; }
        .reply-input-wrapper input { background: var(--bg); border: 1px solid var(--glass-border); color: white; border-radius: 12px; padding: 10px; flex: 1; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="margin-bottom:10px; font-weight: 800; color: var(--neon);">EAC NETWORK</h2>
            <p style="color: var(--text-dim); font-size: 14px;">Masuk untuk mulai mengeksplorasi alam semesta.</p>
            <button class="btn-google" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Login dengan Google
            </button>
        </div>
    </div>

    <header>
        <div class="logo">IEA NETWORK</div>
        <div style="font-size: 10px; border: 1px solid #f85149; color: #f85149; padding: 4px 10px; border-radius: 20px;" onclick="logout()">KELUAR</div>
    </header>

    <div class="container" id="main-feed">
        </div>

    <div class="input-area">
        <input type="text" id="postText" placeholder="Bagikan hipotesismu...">
        <button class="btn-send" onclick="sendPost()">🚀</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsxGe1eRLeml9xpysKNpieV3A5YeGcAhE",
            authDomain: "eacnetwork-bbaf2.firebaseapp.com",
            projectId: "eacnetwork-bbaf2",
            storageBucket: "eacnetwork-bbaf2.firebasestorage.app",
            messagingSenderId: "121872804132",
            appId: "1:121872804132:web:9e98d2cd2fbc15e229ebb1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Pakai Redirect agar lebih lancar di HP (Nggak kena blokir pop-up)
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) listenPosts();
        });

        // Tangani hasil redirect setelah login
        auth.getRedirectResult().catch(e => console.error(e));

        function sendPost() {
            const user = auth.currentUser;
            const input = document.getElementById('postText');
            if(!input.value.trim()) return;

            db.collection("jurnal").add({
                name: user.displayName,
                photo: user.photoURL,
                content: input.value,
                likes: 0,
                time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => input.value = "");
        }

        function listenPosts() {
            db.collection("jurnal").orderBy("time", "desc").onSnapshot(snap => {
                const feed = document.getElementById('main-feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="user-info">
                                <img src="${data.photo}" class="avatar">
                                <div class="user-meta"><h4>${data.name}</h4><span>RESERACHER</span></div>
                            </div>
                            <div class="tag">HIPOTESIS</div>
                            <div class="content">${data.content}</div>
                            <div class="actions">
                                <button class="btn-action" onclick="likePost('${id}', ${data.likes})">❤️ ${data.likes || 0}</button>
                                <button class="btn-action" onclick="toggleReply('${id}')">💬 DEBAT</button>
                            </div>
                            <div class="reply-section" id="section-${id}">
                                <div id="replies-${id}"></div>
                                <div class="reply-input-wrapper">
                                    <input type="text" id="in-${id}" placeholder="Tulis bantahan...">
                                    <button onclick="sendReply('${id}')" style="background:none; border:none; color:var(--neon); font-size:16px;">🚀</button>
                                </div>
                            </div>
                        </div>
                    `;
                    listenReplies(id);
                });
            });
        }

        function sendReply(postId) {
            const user = auth.currentUser;
            const input = document.getElementById(`in-${postId}`);
            if(!input.value.trim()) return;
            db.collection("jurnal").doc(postId).collection("debat").add({
                name: user.displayName,
                text: input.value,
                time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => input.value = "");
        }

        function listenReplies(postId) {
            db.collection("jurnal").doc(postId).collection("debat").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById(`replies-${postId}`);
                if(!box) return;
                box.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    box.innerHTML += `<div class="reply-item"><b>${r.name}:</b> ${r.text}</div>`;
                });
            });
        }

        function toggleReply(id) {
            const el = document.getElementById(`section-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function likePost(id, current) {
            db.collection("jurnal").doc(id).update({ likes: (current || 0) + 1 });
        }
    </script>
</body>
</html>
